server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # The Angular router owns client-side paths, so anything that isn't a real file
    # must fall through to index.html — otherwise a page refresh on /matches 404s.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets are immutable; index.html must never be cached or users
    # get pinned to a stale bundle after a deploy.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Same-origin API: this is why the backend needs no CORS layer.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # A manual pipeline run blocks on provider calls (Apify actors especially).
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # FastAPI's interactive docs.
    location /docs {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }
}
