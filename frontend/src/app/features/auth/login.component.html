<div class="flex min-h-screen items-center justify-center p-6">
  <mat-card class="w-full max-w-md">
    @if (busy()) {
      <mat-progress-bar mode="indeterminate" />
    }

    <mat-card-header class="block p-6 pb-0">
      <mat-card-title>AJH</mat-card-title>
      <mat-card-subtitle>AI Job Hunter</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="p-6">
      <mat-tab-group>
        <mat-tab label="Sign in">
          <form [formGroup]="loginForm" (ngSubmit)="login()" class="flex flex-col gap-4 pt-6">
            <mat-form-field>
              <mat-label>Email</mat-label>
              <input matInput type="email" formControlName="email" autocomplete="email" />
            </mat-form-field>

            <mat-form-field>
              <mat-label>Password</mat-label>
              <input
                matInput
                type="password"
                formControlName="password"
                autocomplete="current-password"
              />
            </mat-form-field>

            <button mat-flat-button type="submit" [disabled]="loginForm.invalid || busy()">
              Sign in
            </button>
          </form>
        </mat-tab>

        <mat-tab label="Create account">
          <form [formGroup]="registerForm" (ngSubmit)="register()" class="flex flex-col gap-4 pt-6">
            <mat-form-field>
              <mat-label>Full name (optional)</mat-label>
              <input matInput formControlName="full_name" autocomplete="name" />
            </mat-form-field>

            <mat-form-field>
              <mat-label>Email</mat-label>
              <input matInput type="email" formControlName="email" autocomplete="email" />
            </mat-form-field>

            <mat-form-field>
              <mat-label>Password</mat-label>
              <input
                matInput
                type="password"
                formControlName="password"
                autocomplete="new-password"
              />
              <mat-hint>At least 8 characters</mat-hint>
            </mat-form-field>

            <button mat-flat-button type="submit" [disabled]="registerForm.invalid || busy()">
              Create account
            </button>

            <p class="text-xs opacity-60">The first account created becomes the Admin.</p>
          </form>
        </mat-tab>
      </mat-tab-group>

      @if (error(); as msg) {
        <p class="mt-4 text-sm" style="color: var(--mat-sys-error)">{{ msg }}</p>
      }
      @if (registered()) {
        <p class="mt-4 text-sm">Account created — sign in above.</p>
      }
    </mat-card-content>
  </mat-card>
</div>
